server {
    listen 80;
    server_name banking.forwardforecasting.eu;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name banking.forwardforecasting.eu;

    ssl_certificate     /etc/letsencrypt/live/banking.forwardforecasting.eu/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/banking.forwardforecasting.eu/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    auth_basic           "Finance Dashboard";
    auth_basic_user_file /etc/nginx/.htpasswd_banking;

    location = / {
        return 302 https://$host/app/;
    }

    location = /logout {
        auth_basic off;
        default_type text/html;
        add_header 'WWW-Authenticate' 'Basic realm="Finance Dashboard"' always;
        return 401 '<!doctype html><html><head><meta charset="utf-8"><title>Logged out</title></head><body style="font-family:sans-serif;text-align:center;padding:4rem"><h2>Logged out</h2><p>Redirecting to login…</p><script>setTimeout(()=>location.replace("/app/"),800)</script></body></html>';
    }

    location /app/ {
        proxy_pass         http://127.0.0.1:8502;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_read_timeout 86400;
    }
}
