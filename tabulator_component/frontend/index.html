<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link href="https://unpkg.com/tabulator-tables@6.3.1/dist/css/tabulator_simple.min.css" rel="stylesheet">
<script src="https://unpkg.com/tabulator-tables@6.3.1/dist/js/tabulator.min.js"></script>
<style>
  html, body { margin:0; padding:0; font-family: -apple-system, "Segoe UI", sans-serif; font-size: 14px; }
</style>
</head>
<body>
<div id="grid"></div>
<script>
let table = null;
let seq = 0;
let categories = [];
let sentinel = "";
let colLabels = {};

function post(msg) {
  msg.isStreamlitMessage = true;
  window.parent.postMessage(msg, "*");
}

function setValue(payload) {
  seq += 1;
  payload.seq = seq;
  post({type: "streamlit:setComponentValue", value: payload, dataType: "json"});
}

function setHeight() {
  const h = document.documentElement.scrollHeight;
  post({type: "streamlit:setFrameHeight", height: h});
}

function renderTable(rows) {
  if (table) {
    table.destroy();
    table = null;
  }
  table = new Tabulator("#grid", {
    data: rows,
    index: "tx_id",
    layout: "fitColumns",
    height: 520,
    placeholder: "No rows",
    columns: [
      {title: colLabels.date || "Date", field: "date", headerFilter: "input", headerFilterFunc: "like", width: 110},
      {title: colLabels.concept || "Concept", field: "concept", headerFilter: "input", headerFilterFunc: "like"},
      {title: colLabels.amount || "Amount", field: "amount", headerFilter: "input", headerFilterFunc: "like", hozAlign: "right", width: 110},
      {title: colLabels.balance || "Balance", field: "balance", hozAlign: "right", width: 110},
      {
        title: colLabels.category || "Category", field: "category", width: 170,
        headerFilter: "input", headerFilterFunc: "like",
        editor: "list", editorParams: {values: categories.concat([sentinel])},
        cellEdited: function(cell) {
          setValue({kind: "edit", tx_id: cell.getRow().getData().tx_id, category: cell.getValue()});
        },
      },
    ],
  });
  table.on("tableBuilt", function() { setHeight(); });
  table.on("dataFiltered", function() { setHeight(); });
  table.on("renderComplete", function() { setHeight(); });
}

function onRender(args) {
  categories = args.categories || [];
  sentinel = args.sentinel || "";
  colLabels = args.col_labels || {};
  renderTable(args.rows || []);
  setTimeout(setHeight, 250);
}

let readyAcked = false;

window.addEventListener("message", function(event) {
  const msg = event.data;
  if (!msg || !msg.type) return;
  if (msg.type === "streamlit:render") {
    readyAcked = true;
    onRender(msg.args || {});
  }
});

// The parent's per-instance listener may not be attached yet on first paint
// (it wires up on the iframe's load event, which can fire after our inline
// script runs), so retry componentReady until the first render arrives.
const readyTimer = setInterval(function() {
  if (readyAcked) { clearInterval(readyTimer); return; }
  post({type: "streamlit:componentReady", apiVersion: 1});
}, 200);
post({type: "streamlit:componentReady", apiVersion: 1});
setHeight();
</script>
</body>
</html>
