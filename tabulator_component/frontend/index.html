<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link href="https://unpkg.com/tabulator-tables@6.3.1/dist/css/tabulator_simple.min.css" rel="stylesheet">
<script src="https://unpkg.com/tabulator-tables@6.3.1/dist/js/tabulator.min.js"></script>
<style>
  html, body { margin:0; padding:0; font-family: -apple-system, "Segoe UI", sans-serif; font-size: 14px; }
  #summary {
    margin-top: 14px;
    padding-top: 10px;
    border-top: 1px solid rgba(128,128,128,0.4);
    display: grid;
    grid-template-columns: 100px repeat(3, minmax(100px, 1fr));
    row-gap: 6px;
    column-gap: 20px;
    align-items: center;
  }
  /* Matches Tabulator's own header text color/weight (rgb(85,85,85), bold)
     so the numbers stay readable against Streamlit's dark theme instead of
     inheriting the browser default black-on-transparent. */
  #summary .colhead { color: #888; font-size: 12px; }
  #summary .rowhead { color: #555; font-weight: 700; font-size: 13px; }
  #summary .value { font-size: 15px; font-weight: 700; color: #555; }
</style>
</head>
<body>
<div id="grid"></div>
<div id="summary">
  <div></div>
  <div class="colhead" id="lblTotal">Total</div>
  <div class="colhead" id="lblMonthly">Monthly avg.</div>
  <div class="colhead" id="lblYearly">Yearly avg.</div>

  <div class="rowhead" id="lblIncome">Income</div>
  <div class="value" id="incTotal">–</div>
  <div class="value" id="incMonthly">–</div>
  <div class="value" id="incYearly">–</div>

  <div class="rowhead" id="lblExpense">Expenses</div>
  <div class="value" id="expTotal">–</div>
  <div class="value" id="expMonthly">–</div>
  <div class="value" id="expYearly">–</div>
</div>
<script>
let table = null;
let seq = 0;
let categories = [];
let sentinel = "";
let colLabels = {};
let summaryLabels = {};
let currency = "€";

function post(msg) {
  msg.isStreamlitMessage = true;
  window.parent.postMessage(msg, "*");
}

function setValue(payload) {
  seq += 1;
  payload.seq = seq;
  post({type: "streamlit:setComponentValue", value: payload, dataType: "json"});
}

function setHeight() {
  const h = document.documentElement.scrollHeight;
  post({type: "streamlit:setFrameHeight", height: h});
}

function fmtAmount(n) {
  return n.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2}) + " " + currency;
}

function updateSummary() {
  if (!table) return;
  const rows = table.getData("active"); // respects header filters
  let incTotal = 0, expTotal = 0;
  const incMonths = new Set(), incYears = new Set();
  const expMonths = new Set(), expYears = new Set();
  rows.forEach(function(r) {
    const amt = parseFloat(r.amount);
    if (isNaN(amt)) return;
    const ym = r.date && r.date.length >= 7 ? r.date.slice(0, 7) : null;
    const y  = r.date && r.date.length >= 4 ? r.date.slice(0, 4) : null;
    if (amt >= 0) {
      incTotal += amt;
      if (ym) incMonths.add(ym);
      if (y) incYears.add(y);
    } else {
      expTotal += -amt;
      if (ym) expMonths.add(ym);
      if (y) expYears.add(y);
    }
  });
  document.getElementById("incTotal").textContent   = fmtAmount(incTotal);
  document.getElementById("incMonthly").textContent = fmtAmount(incMonths.size ? incTotal / incMonths.size : 0);
  document.getElementById("incYearly").textContent  = fmtAmount(incYears.size ? incTotal / incYears.size : 0);
  document.getElementById("expTotal").textContent    = fmtAmount(expTotal);
  document.getElementById("expMonthly").textContent = fmtAmount(expMonths.size ? expTotal / expMonths.size : 0);
  document.getElementById("expYearly").textContent  = fmtAmount(expYears.size ? expTotal / expYears.size : 0);
}

function applySummaryLabels() {
  document.getElementById("lblTotal").textContent   = summaryLabels.total || "Total";
  document.getElementById("lblMonthly").textContent = summaryLabels.monthly || "Monthly avg.";
  document.getElementById("lblYearly").textContent  = summaryLabels.yearly || "Yearly avg.";
  document.getElementById("lblIncome").textContent  = summaryLabels.income || "Income";
  document.getElementById("lblExpense").textContent = summaryLabels.expense || "Expenses";
}

let lastConfigSig = null;

function buildTable(rows) {
  if (table) {
    table.destroy();
    table = null;
  }
  table = new Tabulator("#grid", {
    data: rows,
    index: "tx_id",
    layout: "fitColumns",
    height: 520,
    placeholder: "No rows",
    columns: [
      {title: colLabels.date || "Date", field: "date", headerFilter: "input", headerFilterFunc: "like", width: 110},
      {title: colLabels.concept || "Concept", field: "concept", headerFilter: "input", headerFilterFunc: "like"},
      {title: colLabels.amount || "Amount", field: "amount", headerFilter: "input", headerFilterFunc: "like", hozAlign: "right", width: 110},
      {title: colLabels.balance || "Balance", field: "balance", hozAlign: "right", width: 110},
      {
        title: colLabels.category || "Category", field: "category", width: 170,
        headerFilter: "input", headerFilterFunc: "like",
        editor: "list", editorParams: {values: categories.concat([sentinel])},
        cellEdited: function(cell) {
          setValue({kind: "edit", tx_id: cell.getRow().getData().tx_id, category: cell.getValue()});
        },
      },
    ],
  });
  table.on("tableBuilt", function() { setHeight(); updateSummary(); });
  // dataFiltered fires slightly before Tabulator's internal active-row set is
  // updated, so getData("active") inside the handler can read stale data —
  // defer to let it settle first.
  table.on("dataFiltered", function() { setHeight(); setTimeout(updateSummary, 0); });
  table.on("renderComplete", function() { setHeight(); });
}

function renderTable(rows) {
  // Rebuilding the table from scratch on every render (e.g. after a category
  // save triggers a rerun) wipes any column sort the user applied by
  // clicking a header, since that's client-side Tabulator state. Only
  // rebuild when the column config actually changed (new category added,
  // language switched, etc.); otherwise swap the data in place via
  // replaceData(), which reapplies the existing sort/filters automatically.
  const configSig = JSON.stringify({categories, sentinel, colLabels, currency});
  if (table && configSig === lastConfigSig) {
    table.replaceData(rows).then(function() {
      setHeight();
      updateSummary();
    });
    return;
  }
  lastConfigSig = configSig;
  buildTable(rows);
}

function onRender(args) {
  categories = args.categories || [];
  sentinel = args.sentinel || "";
  colLabels = args.col_labels || {};
  summaryLabels = args.summary_labels || {};
  currency = args.currency || "€";
  applySummaryLabels();
  renderTable(args.rows || []);
  setTimeout(setHeight, 250);
}

let readyAcked = false;

window.addEventListener("message", function(event) {
  const msg = event.data;
  if (!msg || !msg.type) return;
  if (msg.type === "streamlit:render") {
    readyAcked = true;
    onRender(msg.args || {});
  }
});

// The parent's per-instance listener may not be attached yet on first paint
// (it wires up on the iframe's load event, which can fire after our inline
// script runs), so retry componentReady until the first render arrives.
const readyTimer = setInterval(function() {
  if (readyAcked) { clearInterval(readyTimer); return; }
  post({type: "streamlit:componentReady", apiVersion: 1});
}, 200);
post({type: "streamlit:componentReady", apiVersion: 1});
setHeight();
</script>
</body>
</html>
